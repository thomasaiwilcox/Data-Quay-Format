name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: format (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - v1
          - v2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check
        working-directory: ${{ matrix.workspace }}

  clippy:
    name: clippy (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - v1
          - v2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Verify lockfile
        run: cargo metadata --locked --format-version 1 > /dev/null
        shell: bash
        working-directory: ${{ matrix.workspace }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ matrix.workspace }} -> target
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
        working-directory: ${{ matrix.workspace }}

  test:
    name: test (${{ matrix.workspace }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: v2
            os: ubuntu-latest
          - workspace: v2
            os: macos-latest
          - workspace: v2
            os: windows-latest
          - workspace: v1
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify lockfile
        run: cargo metadata --locked --format-version 1 > /dev/null
        shell: bash
        working-directory: ${{ matrix.workspace }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ matrix.workspace }} -> target
          cache-on-failure: true

      - name: Run tests
        run: cargo test --workspace --locked
        working-directory: ${{ matrix.workspace }}

  docs:
    name: docs (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - v1
          - v2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify lockfile
        run: cargo metadata --locked --format-version 1 > /dev/null
        shell: bash
        working-directory: ${{ matrix.workspace }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ matrix.workspace }} -> target
          cache-on-failure: true

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
        working-directory: ${{ matrix.workspace }}

  release-gate:
    name: release gate (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - v1
          - v2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Verify lockfile
        run: cargo metadata --locked --format-version 1 > /dev/null
        shell: bash
        working-directory: ${{ matrix.workspace }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ matrix.workspace }} -> target
          cache-on-failure: true

      - name: Run project release gate
        run: sh scripts/release-gates.sh
        working-directory: ${{ matrix.workspace }}

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
